name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install CMake 3.10.2 manually
        run: |
          wget https://cmake.org/files/v3.10/cmake-3.10.2-Linux-x86_64.sh
          chmod +x cmake-3.10.2-Linux-x86_64.sh
          sudo ./cmake-3.10.2-Linux-x86_64.sh --skip-license --prefix=/usr/local
          
      - name: Install Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # --- 修改点 1 ---
      # 同样只为 arm64 构建，如果这个任务也支持的话
      - name: Build with Gradle (assembleInrtRelease for arm64)
        run: ./gradlew assembleInrtRelease -Pandroid.injected.abi=arm64-v8a

      # --- 修改点 2 ---
      # 明确指定只构建 arm64-v8a 架构
      - name: Build with Gradle (assembleAppRelease for arm64)
        run: ./gradlew assembleAppRelease -Pandroid.injected.abi=arm64-v8a

      # --- 修改点 3 ---
      # 保留 arm64 的上传，移除其他不再需要的上传步骤
      - name: Upload arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-arm64-apk
          path: app/build/outputs/apk/app/release/*-arm64-v8a.apk
